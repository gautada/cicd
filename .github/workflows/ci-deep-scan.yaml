---
name: ci-deep-scan

on:
  workflow_call:
    inputs:
      image_ref:
        description: "Built image reference to scan (optional)"
        type: string
        required: false

permissions:
  contents: read
  security-events: write

jobs:
  deep-scan:
    name: Semgrep + Syft/Grype
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # Semgrep action wrapper is old/deprecated-ish; keep for now if working,
      # but do not rely on it to upload SARIF while debugging Grype.
      - name: Semgrep SAST
        uses: returntocorp/semgrep-action@v1
        with:
          config: p/ci
          generateSarif: true
          uploadSarif: true

      - name: Generate SBOM with Syft
        id: syft
        uses: anchore/sbom-action@v0
        with:
          path: .
          artifact-name: sbom-spdx.json
          format: spdx-json

      - name: Grype scan filesystem
        id: grype
        uses: anchore/scan-action@v6
        with:
          path: .
          output-format: sarif
          fail-build: false

      - name: Debug SARIF path
        if: always()
        run: |
          echo "Grype SARIF: ${{ steps.grype.outputs.sarif }}"
          ls -lh "${{ steps.grype.outputs.sarif }}"
          python -m json.tool "${{ steps.grype.outputs.sarif }}" > /dev/null

      - name: Upload Grype SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ${{ steps.grype.outputs.sarif }}
