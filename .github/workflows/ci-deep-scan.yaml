---
name: ci-deep-scan
# This is the reusable action to run deep security scans on the repo.

on:
  workflow_call:
    inputs:
      image_ref:
        description: "Built image reference to scan (optional)"
        type: string
        required: false

permissions:
  contents: read
  security-events: write

jobs:
  deep-scan:
    name: Semgrep + Syft/Grype
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # --- Semgrep (language-agnostic SAST) ---
      - name: Semgrep SAST
        uses: returntocorp/semgrep-action@v1
        with:
          config: p/ci
          generateSarif: true
          uploadSarif: true  # uploads to GitHub code scanning

      # --- Syft SBOM (filesystem) ---
      - name: Generate SBOM (SPDX) with Syft
        id: syft
        uses: anchore/sbom-action@v0
        with:
          path: .
          artifact-name: sbom-spdx.json
          format: spdx-json

      # --- Grype vuln scan from SBOM or filesystem ---
      - name: Grype scan (filesystem)
        uses: anchore/scan-action@v3
        with:
          path: .
          output-format: sarif
          fail-build: false

      - name: Upload SARIFs (Grype)
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: .
