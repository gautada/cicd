---
name: ci-podman-publish
# Pulls together the manifest and pushes the dev tagged image to registry

on:
  workflow_call:
    inputs:
      architectures:
        description: "List of architectures"
        type: string
        required: true
      tag_dev:
        description: "Tag for development container"
        type: string
        required: false
        default: "dev"
      tag_build:
        description: "Tag for build containers"
        type: string
        required: false
        default: "build"
      registry_name:
        description: "Registry to publish images"
        type: string
        required: false
        default: "docker.io"
    secrets:
      REGISTRY_USERNAME:
        required: true
      REGISTRY_TOKEN:
        required: true

jobs:
  ci:
    name: "Publish Development Images"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Registry Login
        run: |
          echo "${{ secrets.REGISTRY_TOKEN }}" | /usr/bin/podman login \
            --username "${{ secrets.REGISTRY_USERNAME }}" \
            --password-stdin ${{ inputs.registry_name }}

      - name: Resolve version tag
        id: version
        shell: bash
        run: |
          set -euo pipefail
          version=""
          if [ -f VERSION ]; then
            version="$(tr -d ' \r\n' < VERSION)"
          elif [ -x ./version.sh ]; then
            version="$(./version.sh | head -n1 | tr -d ' \r\n')"
          fi
          if [ -z "$version" ]; then
            version="$(git describe --tags --abbrev=0 2>/dev/null || true)"
          fi
          if [ -z "$version" ]; then
            version="v$(git rev-parse --short HEAD)"
          fi
          version="$(printf '%s' "$version" | sed 's/[^A-Za-z0-9._-]/-/g')"
          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Publish Image
        # yamllint disable rule:line-length
        run: |
          set -x
          VERSION_TAG="${{ steps.version.outputs.value }}"
          GIT_VERSION="$(/usr/bin/git rev-parse --short HEAD)"
          CONTAINER="${{ inputs.registry_name }}"
          CONTAINER+="/${{ secrets.REGISTRY_USERNAME }}/"
          CONTAINER+="$(pwd | awk -F'/' '{print $NF}')"
          MANIFEST="${CONTAINER}:${{ inputs.tag_dev }}"
          /usr/bin/podman manifest create "${MANIFEST}"
          for architecture in $(echo '${{ inputs.architectures }}' | jq -r '.[]'); do
           PART="${CONTAINER}:${{ inputs.tag_build }}"
           PART+="-${architecture}"
           PART+="-${GIT_VERSION}"
           BUILD="${CONTAINER}:${{ inputs.tag_build }}-${architecture}"
           /usr/bin/podman pull "${PART}"
           /usr/bin/podman tag "${PART}" "${BUILD}"
           /usr/bin/podman push "${BUILD}"
           /usr/bin/podman manifest add "${MANIFEST}" "${BUILD}"
          done # <<< "${{ inputs.architectures }}"
          DEV_DEST="docker://${CONTAINER}:${{ inputs.tag_dev }}"
          /usr/bin/podman manifest push "${MANIFEST}" "${DEV_DEST}"
          if [ -n "${VERSION_TAG}" ]; then
            VERSION_DEST="docker://${CONTAINER}:${VERSION_TAG}"
            /usr/bin/podman manifest push "${MANIFEST}" "${VERSION_DEST}"
          fi
        # yamllint enable rule:line-length
